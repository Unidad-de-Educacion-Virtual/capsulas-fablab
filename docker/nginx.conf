server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Raíz → sirve pages/index.html internamente sin redirigir al navegador
    location = / {
        rewrite ^ /pages/index.html break;
    }

    # Todo lo demás → busca el archivo exacto, sin fallback que confunda
    location / {
        try_files $uri $uri/ =404;
    }

    # Caché para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|json|glb|blend)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}